<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Калькулятор СЕС — Попередній розрахунок</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* Всі стилі залишаються без змін (вони такі ж, як у попередній версії) */
</style>
</head>
<body>

<!-- HTML без змін (крім видаленого блоку etaSlider) -->
<!-- Тут ваш HTML, але без слайдера ефективності -->

<script>
// ==================== КОНФІГУРАЦІЯ ====================
const DEFAULT_EFFICIENCY = 0.85; // Фіксований ККД 85%

const CONFIG = {
  prices: { onGridRoof: 55000, onGridGround: 50000, onGridLimited: 58000, hybrid: 70000, BESS_per_kWh: 35000, DG_adapter: 15000, cable_per_m: 300 },
  solar: { seasonality: [0.45,0.58,0.82,1.05,1.20,1.28,1.25,1.18,0.98,0.70,0.48,0.38], degradation: 0.005 },
  finance: { discountRate: 0.10, opex_pct: 0.013, design_pct: 0.04, contingency_pct: 0.10 },
  placement: {
    flatRoof:   { uf: 0.60, spm: 7.0, genK: 1.0, name: 'Плоский дах', defaultTilt: 15 },
    slopedRoof: { uf: 0.87, spm: 6.5, genK: 1.0, name: 'Похилий дах', defaultTilt: 30 },
    ground:     { uf: 0.45, spm: 12.0, genK: 1.0, name: 'Наземна', defaultTilt: 30 },
    facade:     { uf: 0.80, spm: 8.0, genK: 0.65, name: 'Фасад', defaultTilt: 90 },
    carport:    { uf: 0.90, spm: 7.0, genK: 1.0, name: 'Навіс', defaultTilt: 10 }
  }
};

let state = { placement: 'flatRoof', orientCoeff: 1.0, orient: 'S', calcMode: 'area', dgOn: false, bessOn: false, selectedScenario: -1, R: {} };
let charts = {};

function getPSH() { return parseFloat(document.getElementById('region').value) || 4.0; }
function fmtN(n, dec=0) { return isNaN(n) || !isFinite(n) ? '—' : n.toLocaleString('uk-UA', {maximumFractionDigits: dec, minimumFractionDigits: dec}); }
function fmtC(n) { return fmtN(n) + ' ₴'; }

let recalcTimer;
function debouncedRecalc() { if (recalcTimer) clearTimeout(recalcTimer); recalcTimer = setTimeout(() => recalcAll(), 100); }

const sectionIds = ['sec0','sec1','sec2','sec3','sec4','sec5'];
function navClick(idx) { document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx)); }
function updateNavOnScroll() { const scrollY = window.scrollY + 140; let active = 0; sectionIds.forEach((id,i) => { const el = document.getElementById(id); if (el && el.offsetTop <= scrollY) active = i; }); document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===active)); }
window.addEventListener('scroll', updateNavOnScroll, { passive: true });

function toggleDG() { state.dgOn = !state.dgOn; document.getElementById('dgToggle').classList.toggle('on', state.dgOn); document.getElementById('dgFields').style.display = state.dgOn ? '' : 'none'; debouncedRecalc(); }
function toggleBESS() { state.bessOn = !state.bessOn; document.getElementById('bessToggle').classList.toggle('on', state.bessOn); document.getElementById('bessFields').style.display = state.bessOn ? '' : 'none'; debouncedRecalc(); }

function setPlacement(key, cardEl) {
  state.placement = key;
  document.querySelectorAll('.placement-card').forEach(c => c.classList.remove('active'));
  if (cardEl) cardEl.classList.add('active');
  const pl = CONFIG.placement[key];
  if (pl) {
    const slider = document.getElementById('tiltSlider');
    slider.value = pl.defaultTilt;
    document.getElementById('tiltVal').textContent = pl.defaultTilt + '°';
  }
  debouncedRecalc();
}

function setMode(m) { 
  state.calcMode = m; 
  document.getElementById('modeA').classList.toggle('active', m==='area'); 
  document.getElementById('modeP').classList.toggle('active', m==='power'); 
  document.getElementById('areaInputBlock').style.display = m==='area' ? '' : 'none'; 
  document.getElementById('powerInputBlock').style.display = m==='power' ? '' : 'none'; 
  debouncedRecalc(); 
}

function setOrient(o, coeff, el) { 
  state.orient = o; 
  state.orientCoeff = coeff; 
  document.querySelectorAll('.orient-btn').forEach(b => b.classList.remove('active')); 
  if (el) el.classList.add('active'); 
  debouncedRecalc(); 
}

function regionChange() { debouncedRecalc(); saveData(); }

function recalcAll() {
  const psh = getPSH();
  const eta = DEFAULT_EFFICIENCY; // Фіксований ККД
  const annual = Math.max(0, parseFloat(document.getElementById('annualConsumption').value)||0);
  const tariff = Math.max(0, parseFloat(document.getElementById('tariff').value)||0);
  const tariffGrowth = parseFloat(document.getElementById('tariffGrowth').value)||0;
  const panelW = parseInt(document.getElementById('panelWatt').value)||500;
  const selfConsume = 0.85;
  const pl = CONFIG.placement[state.placement];
  
  // Оновлення KPI
  const genPerKwp = Math.round(psh * 365 * eta * 0.82);
  document.getElementById('kpi-psh').innerHTML = psh + ' <span class="unit">год/день</span>';
  document.getElementById('kpi-gen-kwp').innerHTML = genPerKwp + ' <span class="unit">кВт·год/рік</span>';
  document.getElementById('kpi-annual-cost').innerHTML = fmtN(annual * tariff) + ' <span class="unit">₴</span>';
  document.getElementById('kpi-daily').innerHTML = fmtN(annual / 365, 0) + ' <span class="unit">кВт·год</span>';
  
  // DG розрахунки
  if (state.dgOn) {
    const dgP = Math.max(0, parseFloat(document.getElementById('dgPower').value)||0);
    const dgFuel = Math.max(0, parseFloat(document.getElementById('dgFuel').value)||0);
    const dgFPrice = Math.max(0, parseFloat(document.getElementById('dgFuelPrice').value)||0);
    const dgH = Math.max(0, parseFloat(document.getElementById('dgHours').value)||0);
    const dgCostYear = dgP * dgFuel * dgH * 365 * dgFPrice;
    const dgFuelYear = dgP * dgFuel * dgH * 365;
    document.getElementById('kpi-dg-cost').innerHTML = fmtC(dgCostYear);
    document.getElementById('kpi-dg-fuel').innerHTML = fmtN(dgFuelYear,0) + ' л/рік';
    document.getElementById('kpi-dg-saving').innerHTML = fmtC(dgCostYear * 0.5) + '/рік';
  }
  
  // Розрахунок потужності
  let power, panels, effArea, totalArea;
  if (state.calcMode === 'area') {
    const area = Math.max(0, parseFloat(document.getElementById('availArea').value)||0);
    effArea = area * pl.uf;
    power = effArea / pl.spm;
    panels = Math.floor(power * 1000 / panelW);
    totalArea = area;
  } else {
    const desiredKwp = Math.max(0, parseFloat(document.getElementById('desiredPower').value)||0);
    power = desiredKwp;
    panels = Math.floor(desiredKwp * 1000 / panelW);
    effArea = desiredKwp * pl.spm;
    totalArea = effArea / pl.uf;
  }
  
  document.getElementById('r-power').innerHTML = fmtN(power,1) + ' <span class="unit">кВп</span>';
  document.getElementById('r-power-sub').textContent = state.orient + ' ×' + state.orientCoeff;
  document.getElementById('r-panels').innerHTML = fmtN(panels) + ' <span class="unit">шт.</span>';
  document.getElementById('r-area').innerHTML = fmtN(effArea) + ' <span class="unit">м²</span>';
  document.getElementById('r-area-sub').textContent = 'з ' + fmtN(totalArea) + ' м² (' + Math.round(pl.uf*100) + '%)';
  document.getElementById('r-spec').innerHTML = pl.spm.toFixed(1) + ' <span class="unit">м²/кВп</span>';
  
  // Генерація
  const annualGen = power * psh * 365 * eta * state.orientCoeff * pl.genK;
  const coverage = annual > 0 ? Math.min(100, (annualGen / annual) * 100) : 0;
  document.getElementById('r-annual-gen').innerHTML = fmtN(annualGen,0);
  document.getElementById('r-coverage').innerHTML = coverage.toFixed(1) + '<span class="unit">%</span>';
  document.getElementById('r-coverage-sub').textContent = fmtN(annualGen * selfConsume,0) + ' кВт·год/рік';
  document.getElementById('r-daily-gen').innerHTML = fmtN(annualGen / 365,1);
  document.getElementById('r-degrad').innerHTML = (100 - CONFIG.solar.degradation * 25 * 100).toFixed(1) + ' <span class="unit">%</span>';
  
  updateChartMonthly(annualGen, annual);
  
  // CAPEX
  const pricePerKwp = parseInt(document.getElementById('sesType').value);
  const cableLen = Math.max(0, parseFloat(document.getElementById('cableLen').value)||0);
  const transformerCost = Math.max(0, parseFloat(document.getElementById('transformerCost').value)||0);
  const bessKwh = state.bessOn ? Math.max(0, parseFloat(document.getElementById('bessKwh').value)||0) : 0;
  const cBase = power * pricePerKwp;
  const cCable = cableLen * CONFIG.prices.cable_per_m;
  const cBESS = bessKwh * CONFIG.prices.BESS_per_kWh;
  const cTransformer = transformerCost;
  const subTotal = cBase + cCable + cBESS + cTransformer;
  const cDesign = subTotal * CONFIG.finance.design_pct;
  const cContingency = subTotal * CONFIG.finance.contingency_pct;
  const capex = subTotal + cDesign + cContingency;
  const opex = capex * CONFIG.finance.opex_pct;
  
  document.getElementById('c-base').innerHTML = fmtC(cBase);
  document.getElementById('c-cable').innerHTML = fmtC(cCable);
  document.getElementById('c-bess').innerHTML = bessKwh > 0 ? fmtC(cBESS) : '—';
  document.getElementById('c-transformer').innerHTML = cTransformer > 0 ? fmtC(cTransformer) : '—';
  document.getElementById('c-design').innerHTML = fmtC(cDesign);
  document.getElementById('c-contingency').innerHTML = fmtC(cContingency);
  document.getElementById('c-total').innerHTML = fmtC(capex);
  
  // Фінанси
  const saving1 = annualGen * selfConsume * tariff;
  const netCF1 = saving1 - opex;
  const payback = netCF1 > 0 ? capex / netCF1 : Infinity;
  
  let npv = -capex;
  for (let y=1; y<=25; y++) {
    const cf = annualGen * selfConsume * tariff * Math.pow(1+tariffGrowth, y) * Math.pow(1 - CONFIG.solar.degradation, y) - opex;
    npv += cf / Math.pow(1+CONFIG.finance.discountRate, y);
  }
  
  let irrVal = 0;
  if (netCF1 > 0 && capex > 0) {
    let lo = -0.5, hi = 5.0;
    for (let iter=0; iter<60; iter++) {
      const mid = (lo+hi)/2;
      let n = -capex;
      for (let y=1; y<=25; y++) n += (netCF1 * Math.pow(1+tariffGrowth, y)) / Math.pow(1+mid, y);
      if (n > 0) lo = mid; else hi = mid;
    }
    irrVal = (lo+hi)/2 * 100;
  }
  
  let totalGen = 0;
  for (let y=1; y<=25; y++) totalGen += annualGen * Math.pow(1-CONFIG.solar.degradation, y);
  const lcoe = totalGen > 0 ? (capex + opex*25) / totalGen : 0;
  
  document.getElementById('r-saving-y1').innerHTML = fmtC(saving1) + '/рік';
  document.getElementById('r-payback').innerHTML = isFinite(payback) ? payback.toFixed(1) + ' <span class="unit">р.</span>' : '—';
  document.getElementById('r-npv').textContent = fmtC(npv);
  document.getElementById('r-irr').innerHTML = irrVal > 0 ? irrVal.toFixed(1) + ' <span class="unit">%</span>' : '—';
  document.getElementById('r-lcoe').textContent = lcoe.toFixed(2) + ' ₴/кВт·год';
  document.getElementById('r-opex').textContent = fmtC(opex) + '/рік';
  
  const insight = payback < 6 ? '✅ Відмінна інвестиція! Окупність ' + payback.toFixed(1) + ' р.' : (payback < 10 ? '📊 Хороша інвестиція. Окупність ' + payback.toFixed(1) + ' р.' : '⚠️ Строк окупності ' + payback.toFixed(1) + ' р. Розгляньте зменшення CAPEX.');
  document.getElementById('finance-insight').textContent = insight;
  
  // Порівняння
  let costWithout = 0;
  for (let y=1; y<=25; y++) costWithout += annual * tariff * Math.pow(1+tariffGrowth, y);
  document.getElementById('cmp-without').textContent = fmtC(costWithout);
  document.getElementById('cmp-with').textContent = fmtC(capex + opex*25);
  document.getElementById('cmp-diff').textContent = '+ ' + fmtC(costWithout - (capex + opex*25));
  document.getElementById('cmp-tariff-now').textContent = tariff.toFixed(2) + ' ₴/кВт·год';
  document.getElementById('cmp-lcoe').textContent = lcoe.toFixed(2) + ' ₴/кВт·год';
  document.getElementById('cmp-lcoe-diff').textContent = '−' + (tariff - lcoe).toFixed(2) + ' ₴';
  
  // Сценарії
  const sc1C = cBase + cCable + cTransformer + cDesign + cContingency;
  const bessAdd = bessKwh > 0 ? cBESS : power * 100 * 35000 / 1000;
  const dgFuelSavYear = state.dgOn ? Math.max(0, parseFloat(document.getElementById('dgPower').value)||0) * 0.27 * Math.max(0, parseFloat(document.getElementById('dgHours').value)||0) * 365 * Math.max(0, parseFloat(document.getElementById('dgFuelPrice').value)||0) * 0.5 : 0;
  const sc = [
    { C: sc1C, save: annualGen * selfConsume * tariff },
    { C: sc1C * 1.02, save: annualGen * selfConsume * tariff + annualGen * 0.15 * tariff * 0.7 },
    { C: sc1C * 1.05 + bessAdd, save: annualGen * selfConsume * tariff * 1.05 },
    { C: sc1C + CONFIG.prices.DG_adapter, save: annualGen * selfConsume * tariff + dgFuelSavYear },
    { C: (sc1C + CONFIG.prices.DG_adapter) * 1.1 + bessAdd, save: (annualGen * selfConsume * tariff + dgFuelSavYear) * 1.05 }
  ];
  sc.forEach(s => { s.op = s.C * CONFIG.finance.opex_pct; s.pay = s.C / (s.save - s.op); });
  const bessHours = ((bessKwh > 0 ? bessKwh : power * 0.3) / Math.max(1, annual/365) * 24);
  for (let i=0;i<5;i++) {
    if (document.getElementById('sc'+i+'-capex')) document.getElementById('sc'+i+'-capex').textContent = fmtC(sc[i].C);
    if (document.getElementById('sc'+i+'-pay')) document.getElementById('sc'+i+'-pay').textContent = isFinite(sc[i].pay) ? sc[i].pay.toFixed(1)+' р.' : '—';
  }
  if (document.getElementById('sc2-reserve')) document.getElementById('sc2-reserve').textContent = bessHours.toFixed(1)+' год';
  if (document.getElementById('sc3-fuel')) document.getElementById('sc3-fuel').textContent = fmtC(dgFuelSavYear)+'/рік';
  if (document.getElementById('sc4-reserve')) document.getElementById('sc4-reserve').textContent = (bessHours*2).toFixed(1)+' год';
  if (document.getElementById('sc4-saving')) document.getElementById('sc4-saving').textContent = fmtC(sc[4].save)+'/рік';
  
  const rows = [
    ['CAPEX', sc.map(s=>fmtC(s.C))],
    ['Окупність', sc.map(s=>isFinite(s.pay)?s.pay.toFixed(1)+' р.':'—')],
    ['Резерв', ['—','—',bessHours.toFixed(1)+' год','ДГ',(bessHours*2).toFixed(1)+' год']]
  ];
  document.getElementById('scenarioCompareBody').innerHTML = rows.map(([lbl,vals]) => `<tr><td class="row-label">${lbl}</td>${vals.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
  
  updateChartCashflow(capex, netCF1, tariffGrowth);
  updateChartCapex(cBase, cCable, cBESS, cTransformer, cDesign+cContingency);
  updateChartScenarios(sc);
  
  state.R = { power, annualGen, saving1, capex, payback, npv, lcoe, irr: irrVal, coverage, annual, tariff, psh, effArea, totalArea, panels, placementName: pl.name, orient: state.orient };
  updateReport(); 
  saveData();
}

// ==================== ЧАРТИ (без змін) ====================
const MONTHS = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

function updateChartMonthly(annualGen, annual) {
  const ctx = document.getElementById('chartMonthly').getContext('2d');
  const seasonSum = CONFIG.solar.seasonality.reduce((a,b)=>a+b,0);
  const monthlyGen = CONFIG.solar.seasonality.map(k => Math.round(annualGen / 12 * k / (seasonSum/12)));
  const monthlyConsumption = Array(12).fill(Math.round(annual / 12));
  const withoutPV = monthlyConsumption;
  const withPV = monthlyConsumption.map((cons, i) => Math.max(0, cons - monthlyGen[i]));
  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: [
        { label: 'Споживання без СЕС', data: withoutPV, backgroundColor: '#94A3B8', borderRadius: 6, barPercentage: 0.7, categoryPercentage: 0.8 },
        { label: 'Споживання з мережі (з СЕС)', data: withPV, backgroundColor: '#F59E0B', borderRadius: 6, barPercentage: 0.7, categoryPercentage: 0.8 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#475569', font: { size: 12, weight: '500' }, boxWidth: 14 } }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString('uk-UA')} кВт·год` } } },
      scales: {
        x: { ticks: { color: '#475569', font: { size: 11, weight: '500' } }, grid: { color: '#E2E8F0' } },
        y: { ticks: { color: '#475569', font: { size: 11 }, callback: v => v.toLocaleString('uk-UA') + ' кВт·год' }, grid: { color: '#E2E8F0' }, title: { display: true, text: 'Електроенергія, кВт·год', color: '#64748B', font: { size: 12 } } }
      }
    },
    plugins: [{
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        for (let i = 0; i < withoutPV.length; i++) {
          const savings = withoutPV[i] - withPV[i];
          if (savings <= 0) continue;
          const meta = chart.getDatasetMeta(1);
          if (meta && meta.data[i]) {
            const bar = meta.data[i];
            ctx.fillStyle = '#10B981';
            ctx.font = 'bold 11px "Inter", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`+ ${savings.toLocaleString('uk-UA')} кВт·год`, bar.x, bar.y - 8);
          }
        }
        ctx.restore();
      }
    }]
  });
}

function updateChartCashflow(capex, cf1, growth) {
  const ctx = document.getElementById('chartCashflow').getContext('2d');
  let cum = -capex; const data = [cum]; const labels = ['0'];
  for (let y=1; y<=25; y++) { cum += cf1 * Math.pow(1+growth, y); data.push(Math.round(cum)); labels.push(''+y); }
  if (charts.cashflow) charts.cashflow.destroy();
  charts.cashflow = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Накопичений потік', data, borderColor: '#10B981', backgroundColor: 'rgba(16,185,129,0.07)', fill: true, tension: 0.35, borderWidth: 2.5, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => (v/1000).toFixed(0)+'k ₴' } } } } });
}
function updateChartCapex(cBase, cCable, cBESS, cTrans, cOther) {
  const ctx = document.getElementById('chartCapex').getContext('2d');
  const labels = ['СЕС','Кабель','BESS','Трансформатор','Проєкт+Резерв'];
  if (charts.capex) charts.capex.destroy();
  charts.capex = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data: [cBase, cCable, cBESS, cTrans, cOther], backgroundColor: ['#F59E0B','#3B82F6','#10B981','#8B5CF6','#94A3B8'], borderWidth: 0, hoverOffset: 6 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '62%', plugins: { legend: { position: 'right', labels: { font:{size:10}, boxWidth:10, padding:8 } } } } });
}
function updateChartScenarios(sc) {
  const ctx = document.getElementById('chartScenarios').getContext('2d');
  const labels = ['Сц.1 Обмеження','Сц.2 Продаж','Сц.3 +BESS','Сц.4 +ДГ','Сц.5 Комбо'];
  if (charts.scenarios) charts.scenarios.destroy();
  charts.scenarios = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'CAPEX (₴)', data: sc.map(s => Math.round(s.C)), backgroundColor: 'rgba(245,158,11,0.75)', borderRadius: 4, yAxisID: 'y' }, { label: 'Окупність (р.)', data: sc.map(s => isFinite(s.pay) ? parseFloat(s.pay.toFixed(1)) : 0), backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4, yAxisID: 'y2' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => (v/1000).toFixed(0)+'k' } }, y2: { position: 'right', ticks: { callback: v => v+' р.' }, grid: { display: false } } } } });
}

function updateReport() {
  const R = state.R;
  document.getElementById('rp-date').textContent = new Date().toLocaleDateString('uk-UA');
  document.getElementById('rp-object-name').textContent = 'Об\'єкт: ' + (document.getElementById('objName').value||'—') + (document.getElementById('objCity').value ? ' · ' + document.getElementById('objCity').value : '');
  document.getElementById('rp-r-obj').textContent = document.getElementById('objName').value || '—';
  const regSel = document.getElementById('region');
  document.getElementById('rp-r-region').textContent = (regSel.options[regSel.selectedIndex]?.text||'—') + ' / PSH ' + getPSH() + ' год/день';
  document.getElementById('rp-r-cons').textContent = fmtN(R.annual,0) + ' кВт·год/рік · ' + fmtN(R.tariff,2) + ' ₴/кВт·год';
  document.getElementById('rp-r-placement').textContent = R.placementName || '—';
  if (R.power) document.getElementById('rp-power').innerHTML = fmtN(R.power,1)+'<span class="rp-unit"> кВп</span>';
  if (R.annualGen) document.getElementById('rp-gen').innerHTML = fmtN(R.annualGen,0)+'<span class="rp-unit"> кВт·год/рік</span>';
  if (R.saving1) document.getElementById('rp-saving').innerHTML = fmtC(R.saving1)+'/рік';
  if (R.capex) document.getElementById('rp-capex').textContent = fmtC(R.capex);
  if (R.payback) document.getElementById('rp-payback').innerHTML = isFinite(R.payback)?R.payback.toFixed(1)+'<span class="rp-unit"> р.</span>':'—';
  if (R.npv) document.getElementById('rp-npv').textContent = fmtC(R.npv);
  if (R.capex) document.getElementById('rp-f-capex').textContent = fmtC(R.capex);
  if (R.irr) document.getElementById('rp-f-irr').textContent = (R.irr||0).toFixed(1)+'% / '+(R.lcoe||0).toFixed(2)+' ₴/кВт·год';
  if (R.coverage) document.getElementById('rp-f-cover').textContent = (R.coverage||0).toFixed(1)+'%';
  const leadInfo = [document.getElementById('leadName').value, document.getElementById('leadCompany').value].filter(Boolean).join(' · ');
  document.getElementById('rp-lead-info').textContent = leadInfo ? 'Підготовлено для: '+leadInfo : '';
}
function selectScenario(i) { state.selectedScenario = i; document.querySelectorAll('.scenario-card').forEach((c,j) => c.classList.toggle('selected', j===i)); }

async function generatePDF() {
  const btn = event.target; btn.textContent = '⏳...'; btn.disabled = true;
  try {
    const { jsPDF } = window.jspdf;
    const el = document.getElementById('reportPreview');
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const imgW = 210; const pageH = 297; const imgH = (canvas.height * imgW) / canvas.width;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    let left = imgH, pos = 0;
    doc.addImage(imgData, 'PNG', 0, pos, imgW, imgH);
    left -= pageH;
    while (left > 0) { pos = left - imgH; doc.addPage(); doc.addImage(imgData, 'PNG', 0, pos, imgW, imgH); left -= pageH; }
    const objName = (document.getElementById('objName').value || 'SES').replace(/[^a-zA-Zа-яА-ЯіїєґІЇЄҐ0-9]/g,'_');
    doc.save('Rozrakhunok_SES_' + objName + '_' + new Date().toISOString().slice(0,10) + '.pdf');
  } catch(e) { alert('PDF error: ' + e.message); }
  btn.textContent = '📥 Завантажити PDF'; btn.disabled = false;
}

function saveData() { try { localStorage.setItem('sesCalcData', JSON.stringify({ annualConsumption: document.getElementById('annualConsumption').value, tariff: document.getElementById('tariff').value, region: document.getElementById('region').value, placement: state.placement, availArea: document.getElementById('availArea').value, panelWatt: document.getElementById('panelWatt').value, orient: state.orient, orientCoeff: state.orientCoeff, tariffGrowth: document.getElementById('tariffGrowth').value, objName: document.getElementById('objName').value, objCity: document.getElementById('objCity').value, dgOn: state.dgOn, bessOn: state.bessOn, bessKwh: document.getElementById('bessKwh').value, dgPower: document.getElementById('dgPower').value, cableLen: document.getElementById('cableLen').value })); } catch(e) {} }
function restoreData() { try { const raw = localStorage.getItem('sesCalcData'); if (!raw) return; const d = JSON.parse(raw); if (d.annualConsumption) document.getElementById('annualConsumption').value = d.annualConsumption; if (d.tariff) document.getElementById('tariff').value = d.tariff; if (d.availArea) document.getElementById('availArea').value = d.availArea; if (d.panelWatt) document.getElementById('panelWatt').value = d.panelWatt; if (d.tariffGrowth) document.getElementById('tariffGrowth').value = d.tariffGrowth; if (d.objName) document.getElementById('objName').value = d.objName; if (d.objCity) document.getElementById('objCity').value = d.objCity; if (d.bessKwh) document.getElementById('bessKwh').value = d.bessKwh; if (d.dgPower) document.getElementById('dgPower').value = d.dgPower; if (d.cableLen) document.getElementById('cableLen').value = d.cableLen; if (d.region) { document.getElementById('region').value = d.region; regionChange(); } if (d.placement) { const cards = document.querySelectorAll('.placement-card'); const keys = ['flatRoof','slopedRoof','ground','facade','carport']; const idx = keys.indexOf(d.placement); if (idx >= 0) setPlacement(d.placement, cards[idx]); } if (d.orient && d.orientCoeff) { state.orient = d.orient; state.orientCoeff = d.orientCoeff; document.querySelectorAll('.orient-btn').forEach(b => { const match = b.textContent.includes(d.orient) || (d.orient==='S' && b.textContent.includes('Південь') && !b.textContent.includes('Захід') && !b.textContent.includes('Схід')); b.classList.toggle('active', match); }); } if (d.dgOn) toggleDG(); if (d.bessOn) toggleBESS(); } catch(e) {} closeModal(); debouncedRecalc(); }
function closeModal() { document.getElementById('restoreModal').style.display = 'none'; }
function resetAll() { if (confirm('Скинути всі налаштування?')) { localStorage.removeItem('sesCalcData'); location.reload(); } }
function shareCalc() { const url = window.location.href.split('#')[0]; navigator.clipboard.writeText(url).then(() => alert('Посилання скопійовано!')).catch(() => prompt('Скопіюйте:', url)); }

window.addEventListener('load', () => { if (localStorage.getItem('sesCalcData')) document.getElementById('restoreModal').style.display = 'flex'; else debouncedRecalc(); });
</script>
